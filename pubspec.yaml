# pubspec.yaml (project root)
name: Agritrack
description: Turmeric field management platform for Kerala agronomists
version: 3.05.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  supabase_flutter: ^2.3.0

  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.3

  go_router: ^13.2.0

  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  flutter_map_geojson: ^1.0.8

  hive_flutter: ^1.1.0
  hive: ^2.2.3

  permission_handler: ^11.3.0

  fl_chart: ^0.67.0

  google_fonts: ^6.2.1
  intl: ^0.19.0
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7
  share_plus: ^12.0.2
  connectivity_plus: ^6.0.3
  flutter_local_notifications: ^22.0.0
  uuid: ^4.3.3
  flutter_launcher_icons: ^0.14.4
  geolocator: ^13.0.0
  flutter_native_splash: ^2.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.9
  hive_generator: ^2.0.1
  mockito: ^5.4.4
  integration_test:
    sdk: flutter


flutter_native_splash:
  color: "#1D5039"
  android_12:
    color: "#1D5039"


flutter:
  uses-material-design: true
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
  assets:
    - assets/images/
    - assets/fonts/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/images/logo.png"
    background_color: "#FFFFFF"
    theme_color: "#FFFFFF"
  windows:
    generate: true
    image_path: "assets/images/logo.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "assets/images/logo.png"