# pubspec.yaml (project root)
name: agritrack
description: Turmeric field management platform for Kerala agronomists
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.3.0

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.3

  # Navigation
  go_router: ^13.2.0

  # Maps
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  flutter_map_geojson: ^1.1.0

  # Offline storage
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # Location
  geolocator: ^11.0.0
  permission_handler: ^11.3.0

  # Charts
  fl_chart: ^0.67.0

  # UI helpers
  google_fonts: ^6.2.1
  intl: ^0.19.0
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7
  share_plus: ^9.0.0
  connectivity_plus: ^6.0.3
  flutter_local_notifications: ^17.1.2
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.9
  hive_generator: ^2.0.1
  mockito: ^5.4.4
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
  assets:
    - assets/images/
    - assets/fonts/